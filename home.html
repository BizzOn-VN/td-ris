<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo Login</title>
    <link rel="icon" type="image/x-icon" href="./images/fav.png?v=4">
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="vendor/wow/animation.css" rel="stylesheet" type="text/css">
    <link href="vendor/owlcarousel/owl.carousel.min.css" rel="stylesheet" type="text/css">
    <link href="vendor/fancybox/jquery.fancybox.min.css" rel="stylesheet" type="text/css">
    <link href="vendor/semantic/semantic.min.css" rel="stylesheet">
    <link href="css/style.css?v=4" rel="stylesheet" media="screen">
</head>
<body>
    <div class="page-login">
        
        <div id="wave-bg">
          <canvas id="wc"></canvas>
        </div>
        <div class="logo"><img src="./images/logo-1.png?v=4" alt=""></div>
        
        <div class="md-form">
            <h6>phần mềm trả kết quả siêu âm</h6>
            <form action="">
                <div class="md-row">
                    <input class="email" type="text" placeholder="Tên đăng nhập">
                    <!-- <p class="error">Vui lòng nhập đúng tên đăng nhập</p> -->
                </div>
                <div class="md-row">
                    <input class="password" type="password" placeholder="Mật khẩu">
                    <!-- <p class="error">Vui lòng nhập đúng password</p> -->
                </div>
                <div class="md-row">
                    <input class="submit" type="button" value="Đăng nhập">
                </div>
            </form>
        </div>
        <div class="logo-footer"><img src="./images/logo-2.png?v=4" alt=""></div>
    </div>
    
</body>
<script src="vendor/jquery/jquery-2.1.0.min.js"></script>
